name: Petvet
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Petvet:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Petvet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petvetcost
        INFOPLIST_FILE: Petvet/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Petvet"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Petvet/Info.plist
      properties:
        CFBundleDisplayName: "Petvet"
        ITSAppUsesNonExemptEncryption: false
  PetvetTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PetvetTests
    dependencies:
      - target: Petvet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petvetcost.tests
  PetvetUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PetvetUITests
    dependencies:
      - target: Petvet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petvetcost.uitests
schemes:
  Petvet:
    build:
      targets:
        Petvet: all
    test:
      targets:
        - PetvetTests
        - PetvetUITests
    run:
      config: Debug
